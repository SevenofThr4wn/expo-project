<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaceID &mdash; Login</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>

<div class="login-layout">

    <div class="login-video-side">
        <div class="login-video-wrapper">
            <img src="/video" alt="Camera Feed">
            <div class="login-feed-label">LIVE</div>
        </div>
    </div>

    <div class="login-panel">
        <div class="login-logo">F</div>
        <h1 class="login-title">FaceID System</h1>
        <p class="login-subtitle">Look at the camera to authenticate</p>

        <div class="scan-ring">
            <div class="scan-inner"></div>
        </div>

        <p id="loginStatus">Scanning for a known face&hellip;</p>
    </div>

</div>

<script>
    async function checkFace() {
        try {
            const res = await fetch("/face-login");
            const data = await res.json();
            if (data.success) {
                document.getElementById("loginStatus").textContent = "Authenticated! Redirecting…";
                window.location.href = "/";
            }
        } catch {
            document.getElementById("loginStatus").textContent = "Camera error. Retrying…";
        }
    }

    setInterval(checkFace, 1500);
</script>

</body>
</html>
